services:
  db:
    image: postgres:16-alpine
    container_name: lloka_db
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-lloka_dev}
      POSTGRES_USER:     ${POSTGRES_USER:-lloka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lloka}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-btree-gist.sql:/docker-entrypoint-initdb.d/init-btree-gist.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lloka} -d ${POSTGRES_DB:-lloka_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/Presentation/Lloka.Api/Dockerfile
    container_name: lloka_api
    environment:
      ASPNETCORE_ENVIRONMENT:      Development
      APPLY_MIGRATIONS_ON_START:   "true"
      ConnectionStrings__DefaultConnection: >-
        Host=db;Database=${POSTGRES_DB:-lloka_dev};
        Username=${POSTGRES_USER:-lloka};
        Password=${POSTGRES_PASSWORD:-lloka}
      Jwt__Secret:         ${JWT_SECRET:-lloka-dev-secret-key-change-in-prod-min-32-chars!!}
      Jwt__Issuer:         ${JWT_ISSUER:-lloka-api}
      Jwt__Audience:       ${JWT_AUDIENCE:-lloka-client}
      Jwt__ExpiresInDays:  ${JWT_EXPIRES_IN_DAYS:-7}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
